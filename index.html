<!DOCTYPE html>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Tech<span>Snap</span></a>
      <nav class="nav">
        <a href="#reviews">レビュー</a>
        <a href="#ranking">ランキング</a>

      <button class="menu-toggle" aria-label="メニュー">

      <a href="#reviews">レビュー</a>

  <!-- Hero -->
  <section class="hero">

        <a href="#reviews" class="btn-primary">レビューを読む</a>
      </div>
      <div id="hero-card" class="hero-card">
        <!-- JS で最新記事が入る -->
        <div style="padding:40px;text-align:center;color:var(--bark);font-size:0.85rem;">読み込み中...</div>
      </div>
    </div>

  <!-- Categories -->
  <section class="categories">
    <div class="container">
      <div class="cat-list">
        <button class="cat-btn active" data-cat="all">すべて</button>
        <button class="cat-btn" data-cat="カメラ">カメラ</button>

      </div>
    </div>
  </section>

  <!-- Articles -->
  <section class="articles" id="reviews">
    <div class="container">
      <h2 class="section-title">最新レビュー</h2>
      <div id="article-grid" class="article-grid">
        <div class="articles-loading">記事を読み込んでいます...</div>
      </div>
    </div>
  </section>

  <!-- Ranking -->
  <section class="ranking" id="ranking">

        <li style="padding:16px 20px;color:var(--bark);font-size:0.85rem;">読み込み中...</li>

  <footer class="site-footer">

      <div class="footer-logo">Tech<span>Snap</span></div>
